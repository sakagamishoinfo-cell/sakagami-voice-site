name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # デプロイ用ディレクトリに公開ファイルのみコピー
      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/images deploy/tools/serifu-counter
          cp index.html privacy.html favicon.svg deploy/
          cp images/profile.jpg deploy/images/
          cp tools/serifu-counter/index.html deploy/tools/serifu-counter/

      # wrangler.toml を生成
      - name: Create wrangler.toml
        run: |
          cat > wrangler.toml << 'EOF'
          name = "shrill-sunset-90f6"
          compatibility_date = "2026-02-16"

          [assets]
          directory = "./deploy"
          EOF

      # Cloudflare Pages にデプロイ
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
